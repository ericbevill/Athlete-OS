<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Andreea Athlete OS</title>
  <style>
:root{
  --bg:#050b14;
  --bg2:#07131f;
  --panel:#0c1828;
  --panel2:#102238;
  --ink:#f0f6ff;
  --muted:#9fb2c8;
  --line:rgba(255,255,255,.14);
  --line2:rgba(255,255,255,.08);
  --aqua:#89f7dc;
  --blue:#8fb7ff;
  --gold:#ffd086;
  --red:#ff8e8e;
  --green:#9df0b5;
  --paper:#fbfcff;
  --paperInk:#0c1726;
  --shadow:0 26px 80px rgba(0,0,0,.36);
}

*{box-sizing:border-box}
html{scroll-behavior:smooth}
body{
  margin:0;
  background:
    radial-gradient(1100px 700px at 72% -15%,rgba(137,247,220,.12),transparent 50%),
    radial-gradient(900px 600px at -10% 10%,rgba(143,183,255,.12),transparent 56%),
    linear-gradient(180deg,#07111d,#050b14 56%,#03070d);
  color:var(--ink);
  font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
}
button,input,textarea,select{font:inherit}

.topbar{position:sticky;top:0;z-index:100;background:rgba(5,11,20,.92);backdrop-filter:blur(18px);border-bottom:1px solid var(--line)}
.topbar-inner{max-width:1540px;margin:0 auto;padding:12px 18px;display:flex;align-items:center;gap:18px}
.brand{font-size:12px;letter-spacing:.18em;text-transform:uppercase;color:var(--aqua);font-weight:950;white-space:nowrap}
.nav{display:flex;gap:6px;overflow:auto;scrollbar-width:none}
.nav button{border:1px solid transparent;background:transparent;color:#c8d7e9;padding:9px 12px;border-radius:999px;cursor:pointer;font-weight:850;white-space:nowrap}
.nav button.active{border-color:rgba(137,247,220,.45);background:rgba(137,247,220,.12);color:#fff}
.wrap{max-width:1540px;margin:0 auto;padding:20px 18px 80px}

.hero{position:relative;min-height:470px;border:1px solid var(--line);overflow:hidden;box-shadow:var(--shadow);background:linear-gradient(90deg,rgba(5,11,20,.97) 0%,rgba(5,11,20,.92) 47%,rgba(5,11,20,.45) 66%,rgba(5,11,20,.78) 100%)}
.court{position:absolute;inset:0;background:linear-gradient(90deg,transparent 0 61%,rgba(255,255,255,.18) 61.06%,transparent 61.25%),linear-gradient(180deg,transparent 0 54%,rgba(255,255,255,.12) 54.05%,transparent 54.25%),linear-gradient(180deg,transparent 0 78%,rgba(255,255,255,.08) 78.05%,transparent 78.25%),repeating-linear-gradient(90deg,rgba(255,255,255,.022) 0 1px,transparent 1px 128px);opacity:.9}
.hero-bg{position:absolute;inset:0;background:url('../assets/andreea-bg.jpg') center right/cover no-repeat;opacity:.18;filter:saturate(.9) contrast(1.05)}
.hero:after{content:"";position:absolute;right:17%;bottom:38px;width:410px;height:410px;border-radius:50%;background:radial-gradient(circle,rgba(137,247,220,.13),rgba(143,183,255,.07) 43%,transparent 72%);filter:blur(6px)}
.hero-cutout{position:absolute;right:26%;bottom:-6px;z-index:3;max-width:34%;max-height:98%;object-fit:contain;filter:drop-shadow(0 36px 60px rgba(0,0,0,.56));pointer-events:none}
.hero-text{position:relative;z-index:4;padding:48px 34px;max-width:780px}
.eyebrow{font-size:12px;letter-spacing:.23em;text-transform:uppercase;color:var(--aqua);font-weight:950}
.hero h1{font-size:clamp(58px,8.5vw,126px);line-height:.84;letter-spacing:-.075em;margin:18px 0 22px}
.hero p{max-width:690px;color:#c7d6e8;font-size:18px;line-height:1.65;margin:0 0 28px}
.btn{border:1px solid var(--line);background:transparent;color:var(--ink);font-weight:900;padding:12px 15px;cursor:pointer;transition:.15s transform,.15s background,.15s border-color;display:inline-flex;align-items:center;gap:8px;text-decoration:none}
.btn:hover{transform:translateY(-1px);border-color:rgba(137,247,220,.38)}
.btn.primary{background:var(--aqua);color:#08241f;border-color:transparent}
.btn.danger{border-color:rgba(255,142,142,.45);color:#ffd1d1}
.hero-actions{display:flex;gap:12px;flex-wrap:wrap}
.hero-stats{position:absolute;right:28px;bottom:28px;z-index:5;display:grid;grid-template-columns:repeat(3,1fr);gap:14px;width:min(460px,42%);border-top:1px solid var(--line);padding-top:14px}
.hero-stat span{display:block;color:var(--muted);font-size:11px;letter-spacing:.18em;text-transform:uppercase;font-weight:950}
.hero-stat strong{font-size:34px;letter-spacing:-.06em}
.tennis-ribbon{position:absolute;right:18px;top:18px;z-index:6;display:flex;gap:6px}
.tennis-ribbon span{font-size:11px;letter-spacing:.18em;text-transform:uppercase;border:1px solid var(--line);padding:7px 9px;color:#d9e9fa;background:rgba(255,255,255,.03)}

.metrics{display:grid;grid-template-columns:repeat(4,1fr);gap:18px;margin-top:22px}
.metric{border-top:1px solid var(--line);padding-top:16px}
.metric span{font-size:12px;letter-spacing:.19em;text-transform:uppercase;color:var(--muted);font-weight:950}
.metric strong{display:block;font-size:46px;letter-spacing:-.07em;margin:8px 0 4px}
.metric p{color:#b9c9db;line-height:1.55;margin:0}
.page{display:none;margin-top:36px}
.page.active{display:block}
.section-head{display:flex;justify-content:space-between;align-items:end;gap:18px;border-top:1px solid var(--line);padding-top:18px;margin-bottom:20px}
.section-head h2{font-size:50px;line-height:.9;letter-spacing:-.065em;margin:0}
.section-head p{color:var(--muted);line-height:1.6;margin:9px 0 0;max-width:860px}
.toolbar{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
.toolbar select,.toolbar input{min-width:170px}
.cards{display:grid;grid-template-columns:repeat(3,1fr);gap:18px}
.card{border-top:1px solid var(--line);padding:16px 0;background:linear-gradient(180deg,rgba(255,255,255,.035),transparent);min-height:132px}
.card .label,.label{font-size:12px;letter-spacing:.2em;text-transform:uppercase;color:var(--aqua);font-weight:950}
.card h3{font-size:28px;line-height:1;margin:10px 0 8px;letter-spacing:-.045em}
.card p{color:#bccadd;line-height:1.6;margin:0}
.card .actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:14px}
.surface-strip{display:flex;gap:8px;flex-wrap:wrap;margin:18px 0}
.surface-strip span{border:1px solid var(--line);padding:8px 10px;font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:#dbe8f6}
.surface-strip .active{border-color:rgba(137,247,220,.5);background:rgba(137,247,220,.1);color:#fff}

.table-wrap{overflow:auto;border-top:1px solid var(--line)}
table{width:100%;min-width:980px;border-collapse:collapse}
th{padding:14px 12px;text-align:left;font-size:12px;letter-spacing:.17em;text-transform:uppercase;color:var(--muted)}
td{padding:13px 12px;border-top:1px solid var(--line2);vertical-align:top}
tr.selected{background:rgba(137,247,220,.08)}
input,textarea,select{width:100%;background:rgba(255,255,255,.045);border:1px solid var(--line);color:var(--ink);padding:10px;border-radius:0;outline:none}
input:focus,textarea:focus,select:focus{border-color:rgba(137,247,220,.55);box-shadow:0 0 0 2px rgba(137,247,220,.08)}
textarea{min-height:90px;resize:vertical}
.compact-input{min-width:120px}
.form-grid{display:grid;grid-template-columns:repeat(12,1fr);gap:14px}
.field{grid-column:span 4}
.field.w3{grid-column:span 3}
.field.w6{grid-column:span 6}
.field.w12{grid-column:span 12}
.field label{display:block;font-size:12px;letter-spacing:.18em;text-transform:uppercase;color:var(--muted);font-weight:950;margin-bottom:8px}
.muted{color:var(--muted)}

/* Career page: commercial roadmap */
.career-showcase{display:grid;gap:28px}
.career-roadmap-shell{border-top:1px solid var(--line);padding-top:24px}
.career-strip-meta{display:flex;justify-content:space-between;align-items:end;gap:20px;margin-bottom:22px;flex-wrap:wrap}
.career-strip-kicker{font-size:12px;letter-spacing:.22em;text-transform:uppercase;color:var(--aqua);font-weight:950;margin-bottom:10px}
.career-strip-copy{max-width:820px;color:#bfd2e5;line-height:1.7;font-size:16px}
.career-rank-chip{min-width:240px;border:1px solid var(--line);background:linear-gradient(135deg,rgba(137,247,220,.08),rgba(143,183,255,.05));padding:18px 20px}
.career-rank-chip .mini{font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--muted);font-weight:900;margin-bottom:8px}
.career-rank-chip strong{display:block;font-size:44px;line-height:.9;letter-spacing:-.05em;margin-bottom:6px}
.career-rank-chip span{color:#c4d4e5;font-size:14px;line-height:1.5}
.career-roadmap{position:relative;display:grid;grid-template-columns:repeat(4,1fr);gap:18px;min-height:430px;padding:18px 0}
.career-roadmap:before{content:"";position:absolute;left:4%;right:4%;top:50%;height:6px;border-radius:999px;background:linear-gradient(90deg,#2fc4f2 0%,#4a9ff8 35%,#8c6fff 68%,#d66eff 100%);box-shadow:0 0 28px rgba(95,157,255,.18);transform:translateY(-50%)}
.roadmap-step{position:relative;min-height:390px}
.roadmap-step.up .roadmap-card{position:absolute;top:0;left:0;right:0}
.roadmap-step.down .roadmap-card{position:absolute;left:0;right:0;bottom:0}
.roadmap-node-wrap{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);z-index:3}
.roadmap-node{width:82px;height:82px;border-radius:999px;background:linear-gradient(135deg,#f8fbff,#dbe7f8);border:4px solid rgba(255,255,255,.6);box-shadow:0 8px 28px rgba(0,0,0,.18);display:flex;align-items:center;justify-content:center;color:#7d8ea4;font-weight:900;font-size:28px;letter-spacing:-.03em}
.roadmap-step:nth-child(4n+1) .roadmap-node{box-shadow:0 10px 28px rgba(47,196,242,.24)}
.roadmap-step:nth-child(4n+2) .roadmap-node{box-shadow:0 10px 28px rgba(74,159,248,.24)}
.roadmap-step:nth-child(4n+3) .roadmap-node{box-shadow:0 10px 28px rgba(140,111,255,.24)}
.roadmap-step:nth-child(4n+4) .roadmap-node{box-shadow:0 10px 28px rgba(214,110,255,.24)}
.roadmap-step.up .roadmap-card:after{content:"";position:absolute;left:50%;bottom:-42px;width:3px;height:42px;transform:translateX(-50%);background:linear-gradient(180deg,rgba(255,255,255,.16),rgba(255,255,255,.65))}
.roadmap-step.down .roadmap-card:before{content:"";position:absolute;left:50%;top:-42px;width:3px;height:42px;transform:translateX(-50%);background:linear-gradient(180deg,rgba(255,255,255,.65),rgba(255,255,255,.16))}
.roadmap-card{border:1px solid var(--line);background:linear-gradient(180deg,rgba(255,255,255,.03),rgba(255,255,255,.01)),radial-gradient(circle at top right,rgba(137,247,220,.1),transparent 36%),linear-gradient(180deg,#0a1523,#09111d);padding:18px 18px 16px;min-height:160px}
.roadmap-topline{display:flex;justify-content:space-between;align-items:center;gap:12px;margin-bottom:10px}
.roadmap-year{font-size:36px;line-height:.92;letter-spacing:-.05em;font-weight:950}
.roadmap-step:nth-child(4n+1) .roadmap-year{color:#55d4f7}
.roadmap-step:nth-child(4n+2) .roadmap-year{color:#6cb4ff}
.roadmap-step:nth-child(4n+3) .roadmap-year{color:#8d86ff}
.roadmap-step:nth-child(4n+4) .roadmap-year{color:#d783ff}
.roadmap-type{font-size:11px;letter-spacing:.18em;text-transform:uppercase;font-weight:950;color:#d7e6f6;border:1px solid rgba(255,255,255,.12);padding:6px 8px}
.roadmap-title{font-size:28px;line-height:.98;letter-spacing:-.04em;margin:0 0 10px}
.roadmap-copy{margin:0;color:#c8d8e8;line-height:1.65;font-size:15px}
.career-admin{margin-top:6px}
.career-admin-title{font-size:28px;line-height:1;letter-spacing:-.04em;margin:0 0 12px}

.calendar-head{display:flex;justify-content:space-between;align-items:center;gap:12px;border-top:1px solid var(--line);padding-top:16px}
.calendar-title{font-size:36px;line-height:1;letter-spacing:-.05em;font-weight:950}
.weekdays,.calendar{display:grid;grid-template-columns:repeat(7,1fr)}
.weekday{padding:10px 8px;color:var(--muted);font-size:12px;letter-spacing:.18em;text-transform:uppercase;font-weight:950;border-bottom:1px solid var(--line)}
.day{min-height:126px;border-right:1px solid var(--line2);border-bottom:1px solid var(--line2);padding:8px;background:rgba(255,255,255,.015);cursor:pointer}
.day.blank{background:transparent;cursor:default}
.day:hover:not(.blank){background:rgba(137,247,220,.05)}
.day-num{font-size:12px;color:#b9c9dc;font-weight:850}
.pill{display:block;margin-top:8px;padding:7px 8px;background:rgba(137,247,220,.12);border-left:3px solid var(--aqua);font-size:12px;color:#e6fff8;cursor:pointer}
.pill.training{background:rgba(143,183,255,.12);border-color:var(--blue)}
.pill.sponsor{background:rgba(255,208,134,.12);border-color:var(--gold)}

.sponsor-grid{display:grid;grid-template-columns:1fr 1fr;gap:18px}
.sponsor-card{border-top:1px solid var(--line);padding-top:16px}
.sponsor-card h3{font-size:30px;line-height:1;letter-spacing:-.05em;margin:8px 0}
.status-line{display:flex;gap:8px;flex-wrap:wrap;color:var(--muted);font-size:13px}
.badge{border:1px solid var(--line);padding:6px 8px;font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:#d9e8f8}
.badge.green{border-color:rgba(157,240,181,.45);color:#c8ffd6}
.badge.gold{border-color:rgba(255,208,134,.45);color:#ffe1ad}
.email-box{background:#091523;border:1px solid var(--line);padding:18px;white-space:pre-line;line-height:1.65;min-height:260px}
.advice-box{border:1px solid var(--line);background:rgba(137,247,220,.05);padding:16px;margin-top:14px;color:#d8e8f8;line-height:1.65}
.doc-layout{display:grid;grid-template-columns:300px 1fr;gap:22px}
.doc-list{display:grid;gap:10px;align-content:start}
.doc-list button{text-align:left;border:1px solid var(--line);background:rgba(255,255,255,.035);color:var(--ink);padding:12px;font-weight:900;cursor:pointer}
.doc-list button.active{background:rgba(137,247,220,.14);border-color:rgba(137,247,220,.5)}
.doc-options{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:14px}
.doc-paper{background:var(--paper);color:var(--paperInk);padding:42px;min-height:560px}
.doc-paper h1{font-size:48px;line-height:.95;letter-spacing:-.065em;margin:0 0 10px}
.doc-paper .sub{color:#60748d;margin-bottom:24px}
.doc-sec{border-top:1px solid #dbe5f2;padding:18px 0}
.doc-sec h4{margin:0 0 10px;color:#667b96;letter-spacing:.16em;text-transform:uppercase;font-size:12px}
.doc-sec p{white-space:pre-line;line-height:1.8;margin:0}
.hidden{display:none!important}

@media(max-width:1180px){
  .career-roadmap{grid-template-columns:repeat(2,1fr);min-height:auto;gap:22px}
  .career-roadmap:before{display:none}
  .roadmap-step{min-height:unset}
  .roadmap-step.up .roadmap-card,.roadmap-step.down .roadmap-card{position:relative;top:auto;bottom:auto}
  .roadmap-step.up .roadmap-card:after,.roadmap-step.down .roadmap-card:before{display:none}
  .roadmap-node-wrap{position:relative;left:auto;top:auto;transform:none;margin:14px 0;display:flex;justify-content:center}
}
@media(max-width:980px){
  .topbar-inner{align-items:flex-start;flex-direction:column}
  .nav{width:100%;padding-bottom:2px}
  .wrap{padding:12px 10px 50px}
  .hero{min-height:680px}
  .hero-text{padding:26px 18px}
  .hero h1{font-size:60px}
  .hero-cutout{right:-16%;bottom:78px;max-width:78%;max-height:52%;opacity:.96}
  .hero-stats{left:18px;right:18px;bottom:18px;width:auto;grid-template-columns:repeat(3,1fr)}
  .tennis-ribbon{display:none}
  .metrics,.cards,.sponsor-grid,.doc-layout,.doc-options{grid-template-columns:1fr}
  .field,.field.w3,.field.w6{grid-column:span 12}
  .section-head{display:block}
  .section-head h2{font-size:38px}
  .weekdays,.calendar{grid-template-columns:repeat(7,minmax(92px,1fr));min-width:644px}
  .calendar-scroll{overflow:auto}
  .day{min-height:104px}
  .hero p{font-size:16px}
  .career-strip-meta{display:grid;gap:16px}
  .career-roadmap{grid-template-columns:1fr}
}
@media print{
  .topbar,.hero,.metrics,.section-head,.doc-list,.doc-options,.btn,.toolbar{display:none!important}
  .wrap{max-width:none;padding:0}
  .page{display:none!important}
  .page.active{display:block!important}
  .doc-layout{display:block}
  .doc-paper{padding:0;background:#fff;color:#111}
}

  </style>
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div class="topbar-inner">
        <div class="brand">Andreea Athlete OS</div>
        <nav class="nav" id="nav"></nav>
      </div>
    </header>

    <main class="wrap">
      <section class="hero">
        <div class="court"></div>
        <div class="hero-bg"></div>
        <div class="tennis-ribbon">
          <span>Clay</span><span>Hard</span><span>Indoor</span><span>Juniors</span>
        </div>
        <img class="hero-cutout" id="heroCutout" src="assets/andreea-cutout.png" alt="Andreea" onerror="this.style.display='none'" />
        <div class="hero-text">
          <div class="eyebrow">Romania · Junior Tennis</div>
          <h1 id="heroName">Andreea Olariu</h1>
          <p id="heroSummary"></p>
          <div class="hero-actions">
            <button class="btn primary" data-go="documents">Generate documents</button>
            <button class="btn" data-go="career">View career timeline</button>
          </div>
        </div>
        <div class="hero-stats">
          <div class="hero-stat"><span>ITF Junior</span><strong id="heroItf">503</strong></div>
          <div class="hero-stat"><span>Funding Need</span><strong id="heroBudget">€0</strong></div>
          <div class="hero-stat"><span>Pipeline</span><strong id="heroPipeline">€0</strong></div>
        </div>
      </section>

      <section class="metrics" id="metrics"></section>

      <section class="page active" id="dashboard"></section>
      <section class="page" id="profile"></section>
      <section class="page" id="career"></section>
      <section class="page" id="calendar"></section>
      <section class="page" id="tournaments"></section>
      <section class="page" id="rankings"></section>
      <section class="page" id="budget"></section>
      <section class="page" id="sponsors"></section>
      <section class="page" id="documents"></section>
      <section class="page" id="settings"></section>
    </main>
  </div>

  <script>
const TABS = ['dashboard','profile','career','calendar','tournaments','rankings','budget','sponsors','documents','settings'];
const RANKING_SYSTEMS = ['ITF Junior','Tennis Europe','FRT Romania','WTA','UTR','WTN'];
const CATEGORIES = ['Girls 18U','U16','U14','U12','Open','Professional'];
const LEVELS = ['ITF Junior J30','ITF Junior J60','ITF Junior J100','ITF Junior J200','ITF Junior J300','ITF Junior J500','Junior Grand Slam','Tennis Europe U12','Tennis Europe U14','Tennis Europe U16','FRT U12','FRT U14','FRT U16','FRT U18','W15','W35','Training','Sponsor/Admin'];
const SURFACES = ['Clay','Hard','Indoor','Grass','Carpet'];
const STATUS = ['Research','Shortlist','Planned','Confirmed','Completed','Skipped'];
const PRIORITY = ['A','B','C','Watch'];
const SPONSOR_STAGE = ['Research','Prospect','Contacted','Meeting','Proposal sent','Negotiating','Committed','Active','Completed','Renewal','Closed lost'];
const CONTRACT_STATUS = ['Not started','Drafting','Sent','Signed','Expired','Cancelled'];
const PAYMENT_STATUS = ['Not invoiced','Invoice scheduled','Invoiced','Partially paid','Paid','Overdue'];
const BUDGET_STATUS = ['Needed','Planned','Quoted','Committed','Paid'];
const CAREER_TYPES = ['Trophy','Final','Semifinal','Ranking','Tournament','Training','Sponsor','Media','Other'];
const SPONSORED_ITEMS = {
  'Tournament travel': { deliverables: 'Pre-event tournament brief, post-event result update, expense summary, thank-you email', advice: 'Attach the Tournament Travel Brief and Budget Request. Best for local companies, service businesses, and family/community brands.' },
  'Coaching block': { deliverables: 'Training plan summary, monthly progress note, coach update, thank-you email', advice: 'Attach the Development Plan and Budget Request. Useful for sponsors who want to fund progress, not just travel.' },
  'Equipment package': { deliverables: 'Photo update, equipment use summary, thank-you email, monthly progress note', advice: 'Attach Athlete Profile and a short Budget Request. Best for small local sponsors.' },
  'Recovery / physio': { deliverables: 'Recovery support summary, monthly update, thank-you email', advice: 'Attach Development Plan and explain performance protection.' },
  'Season partner': { deliverables: 'Monthly sponsor update, quarterly progress report, season review, agreed recognition, renewal conversation', advice: 'Attach Corporate Sponsor Proposal, Season Budget Overview, and Athlete Profile.' },
  'Local prep block': { deliverables: 'Training block update, photo if appropriate, thank-you email', advice: 'Attach Local Sponsor Email and Athlete Profile. Keep the ask smaller and personal.' }
};

const KEY = 'andreea-os-business-dashboard-files-v1';
let state = load();
let active = 'dashboard';

function id(){ return Math.random().toString(36).slice(2,10); }
function clone(v){ return JSON.parse(JSON.stringify(v)); }

function createDefaultState(){
  const now = new Date();
  return {
    athlete: {
      firstName: 'Andreea',
      lastName: 'Olariu',
      sport: 'Tennis',
      city: 'Timișoara, Romania',
      country: 'Romania',
      age: '16',
      club: 'TBD',
      coach: 'TBD',
      school: 'TBD',
      rankingSystem: 'ITF Junior',
      ranking: '503',
      careerHigh: '464',
      seasonHigh: '491',

function load(){
  try{
    const raw = localStorage.getItem(KEY);
    return raw ? migrate(JSON.parse(raw)) : createDefaultState();
  }catch{
    return createDefaultState();
  }
}
function migrate(s){
  const d = createDefaultState();
  s.athlete = { ...d.athlete, ...(s.athlete || {}) };
  s.career = (s.career || []).map(c => ({ ...c, id:c.id || id(), type:c.type || 'Other' }));
  s.tournaments = (s.tournaments || []).map(t => ({ ...t, id:t.id || id() }));
  s.rankings = (s.rankings || []).map(r => ({ ...r, id:r.id || id() }));
  s.budget = (s.budget || []).map(b => ({ ...b, id:b.id || id(), eventId:b.eventId || '', status:b.status || 'Planned' }));
  s.sponsors = (s.sponsors || []).map(x => ({ ...x, id:x.id || id(), contract:x.contract || 'Not started', agreementStart:x.agreementStart || '', agreementEnd:x.agreementEnd || '', paymentStatus:x.paymentStatus || 'Not invoiced', paidAmount:x.paidAmount || 0, scheduledPayment:x.scheduledPayment || '', sponsoredItem:x.sponsoredItem || 'Tournament travel', deliverables:x.deliverables || SPONSORED_ITEMS['Tournament travel'].deliverables, renewal:x.renewal || '' }));
  s.settings = { ...d.settings, ...(s.settings || {}) };
  s.calendar = { ...d.calendar, ...(s.calendar || {}) };
  s.selected = { ...d.selected, ...(s.selected || {}) };
  return s;
}
function save(){ localStorage.setItem(KEY, JSON.stringify(state)); }

function money(v){ return new Intl.NumberFormat('en-IE',{style:'currency',currency:'EUR',maximumFractionDigits:0}).format(Number(v || 0)); }
function date(d){ return d ? new Date(d + 'T00:00:00').toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'}) : 'TBD'; }
function esc(s){ return String(s ?? '').replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m])); }
function opt(list,val){ return list.map(x => `<option value="${esc(x)}" ${x == val ? 'selected' : ''}>${esc(x)}</option>`).join(''); }
function tournamentOptions(val){ return `<option value="">General</option>` + state.tournaments.map(t => `<option value="${t.id}" ${t.id == val ? 'selected' : ''}>${esc(t.name)}</option>`).join(''); }
function totalBudget(){ return state.budget.reduce((a,b) => a + Number(b.amount || 0), 0) + state.tournaments.reduce((a,t) => a + Number(t.budget || 0), 0); }
function eventBudget(eventId){ const t = state.tournaments.find(x => x.id === eventId); const base = Number(t?.budget || 0); const linked = state.budget.filter(b => b.eventId === eventId).reduce((a,b) => a + Number(b.amount || 0), 0); return base + linked; }
function totalSponsors(){ return state.sponsors.reduce((a,b) => a + Number(b.ask || 0), 0); }
function sponsorPaid(){ return state.sponsors.reduce((a,b) => a + Number(b.paidAmount || 0), 0); }
function currentSponsor(){ return state.sponsors.find(s => s.id === state.selected.sponsorId) || state.sponsors[0] || {}; }
function currentTournament(){ return state.tournaments.find(t => t.id === state.selected.tournamentId) || state.tournaments[0] || {}; }
function eventName(id){ return state.tournaments.find(t => t.id === id)?.name || 'General'; }

  const start = (first.getDay() + 6) % 7;

  for(let i=0;i<start;i++) cells.push(`<div class="day blank"></div>`);

  const a = state.athlete, full = `${a.firstName} ${a.lastName}`.trim(), next = currentTournament(), s = currentSponsor();
  return {
    dev: ['Athlete Development Plan',`${full} · ${a.sport} · ${a.city}`,[['Executive summary',`${full} is building a structured junior tennis pathway from Romania, with the immediate objective of improving competitive schedule quality, funding tournament access, and moving toward ${a.rankingGoal}.`],['Athlete profile',a.summary],['Current ranking context',`${a.rankingSystem}: ${a.ranking}. Career high: ${a.careerHigh}. Season high: ${a.seasonHigh}.`],['Strengths',a.strengths],['Development priorities',a.needs],['Tournament roadmap',state.tournaments.map(t => `${date(t.start)}: ${t.name} · ${t.level} · ${t.surface} · ${money(eventBudget(t.id))}`).join(NL)],['Funding need',`Current total funding model: ${money(totalBudget())}. Sponsor pipeline: ${money(totalSponsors())}. Paid: ${money(sponsorPaid())}. Gap: ${money(totalBudget()-sponsorPaid())}.`]]],
    mediaKit: ['Athlete Profile / Media Kit', full, [['Short bio',a.summary],['Career highlights',state.career.map(c => `${c.date}: ${c.title}`).join(NL)],['Current ranking',`${a.rankingSystem}: ${a.ranking}`],['Why support Andreea','Support can be tied to tournament travel, training, equipment, recovery, and ranking development with clear reporting and sponsor deliverables.']]],
    localEmail: ['Local Sponsor Email',`For ${s.company || 'Sponsor'}`,[['Subject',`Local sponsorship opportunity: ${full}`],['Email body',sponsorEmail(s)],['Recommended attachment',recommendedDoc(s)],['Approach note',(SPONSORED_ITEMS[s.sponsoredItem] || SPONSORED_ITEMS['Tournament travel']).advice]]],
    proposal: ['Sponsor Proposal One-Pager',s.company || 'Sponsor',[['Opportunity',`Support ${full}, a Romanian junior tennis player building an international tournament pathway.`],['Ask',`${money(s.ask || state.settings.defaultAsk)} for ${s.package || 'sponsor support'}.`],['Use of funds',s.sponsoredItem || 'Tournament travel, training blocks, equipment, and recovery support.'],['Deliverables',s.deliverables || 'Sponsor updates and recognition where appropriate.'],['Agreement status',`${s.contract || 'Not started'} · Payment: ${s.paymentStatus || 'Not invoiced'}`]]],
    corporate: ['Corporate Sponsor Proposal',s.company || 'Corporate prospect',[['Why this matters',`${full} is building a structured international junior tennis pathway from Romania. The sponsor can support a clear, specific development plan rather than a vague request.`],['Sponsor package',`${s.package || 'Partner'} · Suggested ask: ${money(s.ask || state.settings.defaultAsk)}`],['Business value','Community association, youth sport support, clear reporting, athlete story, and local visibility where appropriate.'],['Next step',s.nextAction || 'Schedule a 15 minute conversation.']]],
    trip: ['Tournament Travel Brief',next.name || 'Tournament',[['Event',[next.name || 'TBD',`${date(next.start)} to ${date(next.end)}`,`${next.city || 'TBD'}, ${next.country || ''}`,`${next.level || ''} · ${next.surface || ''}`].join(NL)],['Budget',money(eventBudget(next.id))],['Purpose',`Competition reps aligned to ranking goal: ${a.rankingGoal}.`],['Sponsor tie-in',`This event can be attached to: ${s.company || 'sponsor prospect'} · ${s.sponsoredItem || 'sponsored item not set'}.`]]],
    calendar: ['Tournament Calendar One-Pager','Season schedule',[['Schedule',state.tournaments.map(t => `${date(t.start)} to ${date(t.end)} · ${t.name} · ${t.city}, ${t.country} · ${t.level} · ${money(eventBudget(t.id))}`).join(NL)]]],
    budget: ['Budget Request',money(totalBudget()),[['Funding need',state.budget.map(b => `${eventName(b.eventId)} · ${b.category}: ${b.description} · ${money(b.amount)} · ${b.status}`).join(NL)],['Tournament base budgets',state.tournaments.map(t => `${t.name}: ${money(t.budget)} base · ${money(eventBudget(t.id))} total`).join(NL)]]],
    update: ['Sponsor Update',full,[['Overview',`${full} continues toward ${a.rankingGoal}.`],['Recent activity',state.tournaments.map(t => `${t.name}: ${t.result || 'pending / research'}`).join(NL)],['Current focus',a.needs],['Sponsor deliverables',s.deliverables || 'No deliverables entered yet.']]],
    thanks: ['Sponsor Thank You Email',s.company || 'Sponsor',[['Email body',`Hi ${s.contact || '[Name]'},${NL}${NL}Thank you for supporting ${full}. Your contribution helps with real tennis development costs: training, travel, competition, equipment, and recovery. We will keep you updated with clear progress notes and event summaries.${NL}${NL}Best,${NL}${state.settings.senderName}`]]],
    agreement: ['Sponsor Agreement Summary',s.company || 'Sponsor',[['Sponsor',s.company || ''],['Support amount',money(s.ask || 0)],['Paid amount',money(s.paidAmount || 0)],['Sponsored item',s.sponsoredItem || ''],['Deliverables',s.deliverables || ''],['Agreement window',`${s.agreementStart || 'TBD'} to ${s.agreementEnd || 'TBD'}`],['Contract status',s.contract || 'Not started'],['Payment status',s.paymentStatus || 'Not invoiced'],['Renewal date',s.renewal || 'TBD']]],
    followup: ['Sponsor Follow-Up Email',s.company || 'Sponsor',[['Email body',`Hi ${s.contact || '[Name]'},${NL}${NL}I wanted to follow up on the sponsorship opportunity for ${full}. The current ask is ${money(s.ask || state.settings.defaultAsk)} and can be tied directly to ${s.sponsoredItem || 'a specific development cost'}.${NL}${NL}Would it be useful if I sent a one-page summary with the budget, tournament schedule, and sponsor deliverables?${NL}${NL}Best,${NL}${state.settings.senderName}`]]],
    paymentReminder: ['Sponsor Payment Reminder',s.company || 'Sponsor',[['Email body',`Hi ${s.contact || '[Name]'},${NL}${NL}A quick note on the sponsorship payment for ${full}. The current scheduled payment date is ${s.scheduledPayment || '[scheduled date]'}, with payment status marked as ${s.paymentStatus || 'Not invoiced'}.${NL}${NL}Please let me know if you need an updated summary, agreement details, or payment information.${NL}${NL}Best,${NL}${state.settings.senderName}`]]]
  };
}
function renderDocuments(){
  const D = docs(), keys = Object.keys(D);
  if(!keys.includes(state.selected.doc)) state.selected.doc = 'dev';
  const d = D[state.selected.doc];
  document.getElementById('documents').innerHTML = header('Documents','Generate, copy, export, and print working documents from dashboard inputs. Choose sponsor and event, then generate the document.',`<button class="btn primary" onclick="window.print()">Print / PDF</button>`) + `<div class="doc-options"><div class="field w12"><label>Sponsor</label><select data-selected="sponsorId">${state.sponsors.map(s => `<option value="${s.id}" ${s.id === state.selected.sponsorId ? 'selected' : ''}>${esc(s.company)}</option>`).join('')}</select></div><div class="field w12"><label>Event</label><select data-selected="tournamentId">${state.tournaments.map(t => `<option value="${t.id}" ${t.id === state.selected.tournamentId ? 'selected' : ''}>${esc(t.name)}</option>`).join('')}</select></div><div class="field w12"><label>Document</label><select data-selected="doc">${Object.entries(D).map(([k,v]) => `<option value="${k}" ${k === state.selected.doc ? 'selected' : ''}>${esc(v[0])}</option>`).join('')}</select></div></div><div class="doc-layout"><div class="doc-list">${Object.entries(D).map(([k,v]) => `<button class="${k === state.selected.doc ? 'active' : ''}" data-doc="${k}">${v[0]}</button>`).join('')}</div><div><div class="doc-paper" id="docPaper">${docHtml(d)}</div><button class="btn primary" id="copyDoc">Copy document text</button><button class="btn" id="downloadDoc">Download .txt</button></div></div>`;
}
function docHtml(d){ return `<h1>${esc(d[0])}</h1><div class="sub">${esc(d[1])}</div>${d[2].map(([h,b]) => `<section class="doc-sec"><h4>${esc(h)}</h4><p>${esc(b)}</p></section>`).join('')}`; }
function sponsorEmail(s){
  const a = state.athlete, full = `${a.firstName} ${a.lastName}`.trim();
  return `Hi ${s.contact || '[Name]'},\n\nI am reaching out because we are building a structured development and sponsorship plan for ${full}, a Romanian junior tennis player based in ${a.city}.\n\n${a.summary}\n\nCurrent ranking context: ${a.rankingSystem} ${a.ranking}, career high ${a.careerHigh}, with a goal of ${a.rankingGoal}.\n\nWe are looking for a ${s.package || 'sponsor'} partner at ${money(s.ask || state.settings.defaultAsk)} to support ${s.sponsoredItem || 'tournament travel, training, equipment, and recovery'}. In return, we can provide: ${s.deliverables || 'periodic updates and recognition where appropriate'}.\n\nWould you be open to a short conversation next week?\n\nBest,\n${state.settings.senderName}`;
}
function renderSettings(){
  document.getElementById('settings').innerHTML = header('Settings','Export and import data, control reusable sender fields, and keep this local browser copy backed up.') + `<div class="form-grid">${field('Sender name','settings','senderName',state.settings.senderName)}${field('Sender email','settings','senderEmail',state.settings.senderEmail)}${field('Phone','settings','phone',state.settings.phone)}${field('Default ask','settings','defaultAsk',state.settings.defaultAsk,'number')}</div><br><button class="btn primary" id="exportBtn">Export JSON backup</button> <label class="btn" for="importFile">Import JSON backup</label><input id="importFile" type="file" accept="application/json" style="display:none"> <button class="btn danger" id="resetBtn">Reset demo data</button>`;
}

function field(label,scope,key,val,type='text',options='',cls=''){
  if(type === 'textarea') return `<div class="field ${cls}"><label>${label}</label><textarea data-scope="${scope}" data-key="${key}">${esc(val)}</textarea></div>`;
  if(type === 'select') return `<div class="field ${cls}"><label>${label}</label><select data-scope="${scope}" data-key="${key}">${opt(options,val)}</select></div>`;
  return `<div class="field ${cls}"><label>${label}</label><input type="${type}" data-scope="${scope}" data-key="${key}" value="${esc(val)}"></div>`;
}
function cell(scope,i,key,val,type='text'){ return `<input type="${type}" data-scope="${scope}" data-idx="${i}" data-key="${key}" value="${esc(val)}">`; }
function selectCell(scope,i,key,val,list){ return `<select data-scope="${scope}" data-idx="${i}" data-key="${key}">${opt(list,val)}</select>`; }
function addTournament(start=''){
  const t = { id:id(), name:'New Tournament', start:start, end:start, track:'ITF Junior', level:'ITF Junior J60', surface:'Clay', city:'', country:'', status:'Research', priority:'B', budget:0, result:'' };
  state.tournaments.push(t);
  state.selected.tournamentId = t.id;
  setActive('tournaments');
}

function render(){
  save();
  nav();
  chrome();
  renderDashboard();
  renderProfile();
  renderCareer();
  renderCalendar();
  renderTournaments();
  renderRankings();
  renderBudget();
  renderSponsors();
  renderDocuments();
  renderSettings();
  document.querySelectorAll('.page').forEach(p => p.classList.toggle('active', p.id === active));
}

document.addEventListener('click', e => {
  const tab = e.target.closest('[data-tab]')?.dataset.tab || e.target.closest('[data-go]')?.dataset.go;
  if(tab){ setActive(tab); return; }
  const tour = e.target.closest('[data-edit-tournament]')?.dataset.editTournament;
  if(tour){ state.selected.tournamentId = tour; setActive('tournaments'); setTimeout(() => document.getElementById('tour-' + tour)?.scrollIntoView({block:'center',behavior:'smooth'}), 60); return; }
  const day = e.target.closest('[data-add-date]')?.dataset.addDate;
  if(day && !e.target.closest('[data-edit-tournament]')){ addTournament(day); return; }
  const doc = e.target.closest('[data-doc]')?.dataset.doc;
  if(doc){ state.selected.doc = doc; renderDocuments(); return; }
  const em = e.target.closest('[data-email-sponsor]')?.dataset.emailSponsor;
  if(em != null){ state.selected.sponsorId = state.sponsors[Number(em)].id; document.getElementById('emailBox').textContent = sponsorEmail(state.sponsors[Number(em)]); return; }
  const del = e.target.closest('[data-delete]')?.dataset.delete;
  if(del){ const [scope,i] = del.split(':'); state[scope].splice(Number(i),1); render(); return; }
  if(e.target.id === 'addCareer'){ state.career.push({id:id(), date:new Date().getFullYear().toString(), type:'Other', title:'New milestone', body:''}); render(); return; }
  if(e.target.id === 'addTournament'){ addTournament(); return; }
  if(e.target.id === 'addRanking'){ state.rankings.push({id:id(), system:'ITF Junior', category:'Girls 18U', value:'', date:'', goal:''}); render(); return; }
  if(e.target.id === 'addBudget'){ state.budget.push({id:id(), eventId:state.selected.tournamentId || '', category:'Training', description:'New budget item', amount:0, status:'Planned'}); render(); return; }
  if(e.target.id === 'addSponsor'){ state.sponsors.push({id:id(), company:'New Sponsor', contact:'', email:'', package:'Local Partner', ask:1000, stage:'Prospect', contract:'Not started', agreementStart:'', agreementEnd:'', paymentStatus:'Not invoiced', paidAmount:0, scheduledPayment:'', sponsoredItem:'Tournament travel', deliverables:SPONSORED_ITEMS['Tournament travel'].deliverables, nextAction:'Research contact', renewal:'', notes:''}); render(); return; }
  if(e.target.id === 'copyEmail'){ navigator.clipboard.writeText(document.getElementById('emailBox').textContent); return; }
  if(e.target.id === 'copyDoc'){ navigator.clipboard.writeText(document.getElementById('docPaper').innerText); return; }
  if(e.target.id === 'downloadDoc'){ const blob = new Blob([document.getElementById('docPaper').innerText],{type:'text/plain'}); const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = 'athlete-os-document.txt'; a.click(); return; }
  if(e.target.id === 'exportBtn'){ const blob = new Blob([JSON.stringify(state,null,2)],{type:'application/json'}); const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = 'andreea-athlete-os-backup.json'; a.click(); return; }
  if(e.target.id === 'resetBtn' && confirm('Reset all data?')){ localStorage.removeItem(KEY); state = createDefaultState(); render(); return; }
  if(e.target.id === 'prevMonth'){ state.calendar.month--; if(state.calendar.month < 0){ state.calendar.month = 11; state.calendar.year--; } render(); return; }
  if(e.target.id === 'nextMonth'){ state.calendar.month++; if(state.calendar.month > 11){ state.calendar.month = 0; state.calendar.year++; } render(); return; }
});

document.addEventListener('input', e => {
  const el = e.target;
  const {scope,idx,key} = el.dataset;
  if(!scope) return;
  const val = el.type === 'number' ? Number(el.value || 0) : el.value;
  if(idx != null) state[scope][Number(idx)][key] = val;
  else state[scope][key] = val;
  if(scope === 'sponsors' && key === 'sponsoredItem'){
    const guide = SPONSORED_ITEMS[val];
    if(guide) state.sponsors[Number(idx)].deliverables = guide.deliverables;
  }
  save();
  chrome();
});

document.addEventListener('change', async e => {
  const el = e.target;
  if(el.dataset.selected){ state.selected[el.dataset.selected] = el.value; save(); render(); return; }
  const {scope,idx,key} = el.dataset;
  if(scope){
    const val = el.type === 'number' ? Number(el.value || 0) : el.value;
    if(idx != null) state[scope][Number(idx)][key] = val;
    else state[scope][key] = val;
    if(scope === 'sponsors' && key === 'sponsoredItem'){
      const guide = SPONSORED_ITEMS[val];
      if(guide) state.sponsors[Number(idx)].deliverables = guide.deliverables;
    }
    render();
    return;
  }
  if(el.id === 'monthPicker'){
    const [y,m] = el.value.split('-').map(Number);
    state.calendar.year = y;
    state.calendar.month = m - 1;
    render();
    return;
  }
  if(el.id === 'importFile'){
    const f = el.files[0];
    if(!f) return;
    try{ state = migrate(JSON.parse(await f.text())); render(); alert('Imported'); }
    catch{ alert('Could not import file'); }
  }
});

render();

  </script>
</body>
</html>
