<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Athlete OS</title>
  <style>
    :root {
      --ink: #0b1020;
      --ink-2: #182033;
      --muted: #667085;
      --line: #e5e7eb;
      --card: #ffffff;
      --bg: #f6f1e8;
      --gold: #ffd33d;
      --gold-2: #fff3b8;
      --blue: #284b8f;
      --green: #087f5b;
      --red: #b42318;
      --shadow: 0 16px 50px rgba(15, 23, 42, 0.10);
      --radius-xl: 28px;
      --radius-lg: 20px;
      --radius-md: 14px;
      --font: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    * { box-sizing: border-box; }
    body { margin: 0; font-family: var(--font); background: var(--bg); color: var(--ink); }
    button, input, textarea, select { font: inherit; }
    button { cursor: pointer; }
    a { color: inherit; }
    .app { display: grid; grid-template-columns: 290px 1fr; min-height: 100vh; }
    .sidebar { position: sticky; top: 0; height: 100vh; background: var(--ink); color: white; padding: 22px; display: flex; flex-direction: column; gap: 18px; }
    .brand { border: 1px solid rgba(255,255,255,0.12); background: rgba(255,255,255,0.08); border-radius: var(--radius-xl); padding: 22px; }
    .kicker { color: var(--gold); letter-spacing: .22em; text-transform: uppercase; font-size: 12px; font-weight: 800; }
    .brand h1 { margin: 12px 0 10px; font-size: 25px; line-height: 1.12; }
    .brand p { margin: 0; color: #cbd5e1; font-size: 14px; line-height: 1.55; }
    .nav { display: grid; gap: 8px; }
    .nav button { border: 0; width: 100%; text-align: left; border-radius: 18px; padding: 13px 15px; background: transparent; color: #cbd5e1; font-weight: 750; display: flex; gap: 11px; align-items: center; }
    .nav button.active { background: var(--gold); color: var(--ink); }
    .note { margin-top: auto; border: 1px solid rgba(255,255,255,0.12); background: rgba(255,255,255,0.08); border-radius: var(--radius-lg); padding: 16px; color: #d6d9e3; font-size: 13px; line-height: 1.45; }
    .main { padding: 28px; max-width: 1260px; width: 100%; }
    .mobile-top { display: none; background: white; border: 1px solid var(--line); border-radius: 22px; padding: 12px; margin-bottom: 18px; justify-content: space-between; align-items: center; box-shadow: 0 8px 20px rgba(15,23,42,.06); }
    .hero { background: var(--ink); color: white; border-radius: 34px; overflow: hidden; box-shadow: var(--shadow); margin-bottom: 20px; }
    .hero-inner { display: grid; grid-template-columns: 1.25fr .75fr; gap: 28px; padding: 34px; }
    .pill { display: inline-flex; gap: 8px; align-items: center; background: rgba(255,255,255,.10); border: 1px solid rgba(255,255,255,.10); border-radius: 999px; padding: 9px 13px; font-size: 12px; font-weight: 800; letter-spacing: .15em; text-transform: uppercase; color: #fde68a; }
    .hero h2 { margin: 18px 0 12px; font-size: clamp(32px, 5vw, 58px); line-height: .98; letter-spacing: -0.045em; }
    .hero p { margin: 0; color: #d1d5db; max-width: 720px; line-height: 1.7; }
    .chips { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 22px; }
    .chip { background: rgba(255,255,255,.10); border-radius: 999px; padding: 9px 13px; font-size: 13px; color: #f8fafc; }
    .focus { border: 1px solid rgba(255,255,255,.12); background: rgba(255,255,255,.09); border-radius: var(--radius-xl); padding: 22px; }
    .focus h3 { margin: 12px 0 8px; font-size: 24px; }
    .focus-box { margin-top: 16px; background: white; color: var(--ink); border-radius: 18px; padding: 16px; }
    .stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; margin-bottom: 20px; }
    .stat, .card { background: var(--card); border: 1px solid var(--line); border-radius: var(--radius-xl); box-shadow: 0 10px 24px rgba(15,23,42,.055); }
    .stat { padding: 20px; }
    .stat-label { color: var(--muted); font-weight: 750; font-size: 13px; }
    .stat-value { margin-top: 7px; font-size: 31px; font-weight: 900; letter-spacing: -0.04em; }
    .stat-detail { margin-top: 8px; color: var(--muted); font-size: 13px; line-height: 1.45; }
    .section-head { display: flex; justify-content: space-between; align-items: flex-end; gap: 18px; margin: 4px 0 18px; }
    .section-head h2 { margin: 0; font-size: 30px; letter-spacing: -0.035em; }
    .section-head p { margin: 7px 0 0; color: var(--muted); line-height: 1.55; max-width: 760px; }
    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 18px; }
    .grid-3 { display: grid; grid-template-columns: repeat(3,1fr); gap: 14px; }
    .card { padding: 22px; }
    .row-list { display: grid; gap: 12px; }
    .row { border: 1px solid #eef0f4; background: #f9fafb; border-radius: var(--radius-lg); padding: 16px; display: flex; justify-content: space-between; gap: 16px; align-items: flex-start; }
    .row h4 { margin: 0; }
    .row p { margin: 5px 0 0; color: var(--muted); font-size: 14px; line-height: 1.45; }
    .badge { border-radius: 999px; padding: 7px 10px; font-weight: 800; font-size: 12px; white-space: nowrap; }
    .badge.gold { background: var(--gold-2); color: #7a4b00; }
    .badge.dark { background: var(--ink); color: white; }
    .badge.green { background: #d1fadf; color: var(--green); }
    .form-grid { display: grid; grid-template-columns: repeat(4,1fr); gap: 14px; }
    label { display: block; }
    label span { display: block; margin: 0 0 8px; color: #667085; text-transform: uppercase; letter-spacing: .17em; font-size: 11px; font-weight: 900; }
    input, textarea, select { width: 100%; border: 1px solid var(--line); border-radius: 16px; background: #fff; color: var(--ink); padding: 12px 14px; outline: none; transition: box-shadow .15s, border-color .15s; }
    textarea { min-height: 92px; resize: vertical; line-height: 1.55; }
    input:focus, textarea:focus, select:focus { border-color: var(--ink); box-shadow: 0 0 0 4px rgba(15,23,42,.08); }
    .span-2 { grid-column: span 2; }
    .span-4 { grid-column: span 4; }
    .btn-row { display: flex; flex-wrap: wrap; gap: 10px; }
    .btn { border: 0; border-radius: 17px; padding: 12px 16px; font-weight: 900; background: var(--ink); color: white; box-shadow: 0 10px 18px rgba(15,23,42,.18); }
    .btn.secondary { border: 1px solid var(--line); background: white; color: var(--ink); box-shadow: none; }
    .btn.gold { background: var(--gold); color: var(--ink); }
    .btn.red { background: #fee4e2; color: var(--red); box-shadow: none; }
    .link-card { display: block; text-decoration: none; background: white; border: 1px solid var(--line); border-radius: var(--radius-xl); padding: 20px; box-shadow: 0 9px 22px rgba(15,23,42,.055); transition: transform .15s, box-shadow .15s; }
    .link-card:hover { transform: translateY(-2px); box-shadow: var(--shadow); }
    .link-card b { display: block; margin: 12px 0 6px; }
    .link-card p { color: var(--muted); margin: 0; line-height: 1.45; font-size: 14px; }
    .item-card { margin-bottom: 14px; }
    .doc-tabs { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 16px; }
    .print-sheet { background: white; border: 1px solid var(--line); box-shadow: var(--shadow); border-radius: 30px; padding: 42px; max-width: 900px; margin: 0 auto; }
    .print-sheet h1 { font-size: 42px; line-height: 1; margin: 10px 0; letter-spacing: -.045em; }
    .print-sheet .sub { color: var(--muted); margin-bottom: 26px; }
    .doc-section { border-top: 1px solid var(--line); padding-top: 20px; margin-top: 20px; }
    .doc-section h3 { margin: 0 0 10px; color: var(--muted); text-transform: uppercase; letter-spacing: .16em; font-size: 12px; }
    .doc-section div { white-space: pre-line; line-height: 1.75; }
    .hidden { display: none !important; }
    .utility { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 12px; }
    .small { font-size: 12px; color: var(--muted); line-height: 1.5; }
    @media (max-width: 980px) {
      .app { display: block; }
      .sidebar { display: none; }
      .mobile-top { display: flex; }
      .main { padding: 16px; }
      .hero-inner, .grid-2 { grid-template-columns: 1fr; }
      .stats, .grid-3 { grid-template-columns: 1fr 1fr; }
      .form-grid { grid-template-columns: 1fr 1fr; }
      .span-4 { grid-column: span 2; }
    }
    @media (max-width: 640px) {
      .stats, .grid-3, .form-grid { grid-template-columns: 1fr; }
      .span-2, .span-4 { grid-column: span 1; }
      .hero-inner { padding: 22px; }
      .print-sheet { padding: 24px; }
    }
    @media print {
      body { background: white; }
      .sidebar, .mobile-top, .section-head, .doc-tabs, .no-print { display: none !important; }
      .app { display: block; }
      .main { padding: 0; max-width: none; }
      .screen { display: none !important; }
      #printView { display: block !important; }
      .print-sheet { border: 0; box-shadow: none; border-radius: 0; max-width: none; padding: 30px; }
    }
  </style>
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <div class="brand">
        <div class="kicker">Athlete OS</div>
        <h1>Private family command center</h1>
        <p>Track tournaments, build profile documents, manage budgets, and coordinate sponsor outreach.</p>
      </div>
      <nav class="nav" id="nav"></nav>
      <div class="note">
        <b>Storage:</b> this single-file app saves data in this browser using localStorage. Use Export JSON for backup or sharing.
      </div>
    </aside>

    <main class="main">
      <div class="mobile-top no-print">
        <strong>Athlete OS</strong>
        <select id="mobileNav"></select>
      </div>
      <div class="screen" id="appView"></div>
      <div class="hidden" id="printView"></div>
    </main>
  </div>

<script>
const KEY = 'athlete_os_private_single_file_v1';
const uid = () => Date.now().toString(36) + Math.random().toString(36).slice(2, 8);
const money = v => new Intl.NumberFormat('en-US',{style:'currency',currency:'EUR',maximumFractionDigits:0}).format(Number(v||0));
const fmtDate = v => !v ? 'TBD' : new Intl.DateTimeFormat('en-GB',{day:'2-digit',month:'short',year:'numeric'}).format(new Date(v + 'T00:00:00'));
const escapeHtml = value => String(value ?? '').replace(/[&<>'"]/g, ch => ({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[ch]));
const nl2br = value => escapeHtml(value).replace(/\n/g, '<br>');
const tabs = [
  ['dashboard','Dashboard'], ['profile','Profile'], ['tournaments','Tournaments'], ['budget','Budget'], ['sponsors','Sponsors'], ['milestones','Milestones'], ['print','Print Center'], ['data','Data']
];
const defaults = {
  athlete: {
    firstName: '', lastName: '', sport: 'Tennis', city: 'Timișoara, Romania', birthYear: '', handedness: 'Right-handed', height: '', coach: '', club: '', ranking: '',
    story: 'A promising junior athlete from Romania working toward stronger regional and international opportunities.',
    strengths: 'Competitive, disciplined, coachable, resilient under pressure.',
    developmentNeeds: 'Match scheduling, international exposure, physical preparation, recovery planning.',
    goal12Months: 'Build a stronger tournament calendar, improve match toughness, and secure local sponsor support.'
  },
  tournaments: [
    {id:uid(), name:'Sample ITF Junior Tournament', city:'TBD', country:'Romania', startDate:'2026-06-15', endDate:'2026-06-21', level:'Juniors', surface:'Clay', status:'Researching', priority:'A', budget:950, result:'', notes:'Replace with a real event once confirmed.'},
    {id:uid(), name:'Regional Prep Event', city:'Timișoara', country:'Romania', startDate:'2026-07-05', endDate:'2026-07-07', level:'Local', surface:'Clay', status:'Shortlist', priority:'B', budget:300, result:'', notes:'Use as a lower-cost preparation event.'}
  ],
  budget: [
    {id:uid(), category:'Coaching', description:'Monthly private training block', amount:600, status:'Planned'},
    {id:uid(), category:'Travel', description:'Tournament transport and lodging', amount:950, status:'Planned'},
    {id:uid(), category:'Equipment', description:'Strings, grips, shoes', amount:250, status:'Needed'}
  ],
  sponsors: [
    {id:uid(), name:'Local Business Prospect', contact:'Owner or Marketing Manager', email:'', category:'Local sponsor', ask:1500, stage:'Prospect', nextAction:'Send local sponsor email', valueProposition:'Support a promising local junior athlete with a clear monthly update and community story.'}
  ],
  milestones: [
    {id:uid(), date:'2026-06-01', title:'Finalize summer tournament calendar', type:'Planning', notes:'Build shortlist and budget.'},
    {id:uid(), date:'2026-06-10', title:'Publish sponsor profile', type:'Sponsorship', notes:'Prepare profile and first email list.'},
    {id:uid(), date:'2026-07-01', title:'Begin physical preparation block', type:'Training', notes:'Add measurable weekly habits.'}
  ]
};
let data = load();
let active = 'dashboard';
let docType = 'dev';
function load(){ try { return JSON.parse(localStorage.getItem(KEY)) || structuredClone(defaults); } catch { return structuredClone(defaults); } }
function save(){ localStorage.setItem(KEY, JSON.stringify(data)); render(); }
function resetData(){ if(confirm('Reset all data to sample defaults?')){ data = structuredClone(defaults); save(); } }
function section(title, desc, action=''){ return `<div class="section-head"><div><h2>${title}</h2><p>${desc}</p></div><div class="btn-row">${action}</div></div>`; }
function field(path, label, value, opts={}) {
  const type = opts.type || 'text'; const span = opts.span ? ` span-${opts.span}` : ''; const textarea = opts.textarea;
  const safe = escapeHtml(value || '');
  return `<label class="${span}"><span>${label}</span>${textarea ? `<textarea data-path="${path}">${safe}</textarea>` : `<input data-path="${path}" type="${type}" value="${safe}">`}</label>`;
}
function arrayField(collection, id, key, label, value, opts={}) {
  const type = opts.type || 'text'; const span = opts.span ? ` span-${opts.span}` : ''; const textarea = opts.textarea;
  const safe = escapeHtml(value || '');
  return `<label class="${span}"><span>${label}</span>${textarea ? `<textarea data-collection="${collection}" data-id="${id}" data-key="${key}">${safe}</textarea>` : `<input data-collection="${collection}" data-id="${id}" data-key="${key}" type="${type}" value="${safe}">`}</label>`;
}
function addButton(label, action){ return `<button class="btn" data-action="${action}">+ ${label}</button>`; }
function hero(){
  const a = data.athlete;
  const next = [...data.tournaments].sort((x,y)=>(x.startDate||'9999').localeCompare(y.startDate||'9999'))[0];
  return `<div class="hero"><div class="hero-inner"><div><span class="pill">★ Athlete command center</span><h2>${escapeHtml(a.firstName||'Athlete')} ${escapeHtml(a.lastName||'Profile')}</h2><p>${escapeHtml(a.goal12Months)}</p><div class="chips"><span class="chip">${escapeHtml(a.sport)}</span><span class="chip">${escapeHtml(a.city)}</span><span class="chip">Ranking: ${escapeHtml(a.ranking||'TBD')}</span></div></div><div class="focus"><span class="kicker">Next focus</span><h3>${escapeHtml(next?.name||'Add a tournament')}</h3><p>${next ? `${fmtDate(next.startDate)} in ${escapeHtml(next.city||'TBD')}, ${escapeHtml(next.country||'TBD')}` : 'Create a calendar and assign priorities.'}</p><div class="focus-box"><div class="stat-label">Estimated event budget</div><div class="stat-value">${money(next?.budget||0)}</div></div></div></div></div>`;
}
function stats(){
 const budget = data.budget.reduce((s,i)=>s+Number(i.amount||0),0); const pipeline=data.sponsors.reduce((s,i)=>s+Number(i.ask||0),0); const confirmed=data.tournaments.filter(t=>t.status==='Confirmed').length;
 return `<div class="stats"><div class="stat"><div class="stat-label">Tournaments</div><div class="stat-value">${data.tournaments.length}</div><div class="stat-detail">${confirmed} confirmed, ${data.tournaments.length-confirmed} open</div></div><div class="stat"><div class="stat-label">Annual needs</div><div class="stat-value">${money(budget)}</div><div class="stat-detail">Training, travel, and equipment</div></div><div class="stat"><div class="stat-label">Sponsor pipeline</div><div class="stat-value">${money(pipeline)}</div><div class="stat-detail">${data.sponsors.length} prospects tracked</div></div><div class="stat"><div class="stat-label">Milestones</div><div class="stat-value">${data.milestones.length}</div><div class="stat-detail">Career and support roadmap</div></div></div>`;
}
function renderDashboard(){
 return hero()+stats()+`<div class="grid-2"><div class="card"><h3>Priority tournament board</h3><div class="row-list">${data.tournaments.map(t=>`<div class="row"><div><h4>${escapeHtml(t.name)}</h4><p>${fmtDate(t.startDate)} · ${escapeHtml(t.city||'TBD')} · ${escapeHtml(t.level||'Level TBD')}</p></div><div class="btn-row"><span class="badge dark">Priority ${escapeHtml(t.priority)}</span><span class="badge gold">${escapeHtml(t.status)}</span></div></div>`).join('')}</div></div><div class="card"><h3>Sponsor actions</h3><div class="row-list">${data.sponsors.map(s=>`<div class="row"><div><h4>${escapeHtml(s.name)}</h4><p>${escapeHtml(s.nextAction||'No next action')}</p></div><span class="badge dark">${money(s.ask)}</span></div>`).join('')}</div></div></div>`;
}
function renderProfile(){ const a=data.athlete; return section('Profile builder','Build the athlete story once and reuse it in the generated documents.')+`<div class="grid-2"><div class="card"><div class="form-grid">${field('athlete.firstName','First name',a.firstName)}${field('athlete.lastName','Last name',a.lastName)}${field('athlete.sport','Sport',a.sport)}${field('athlete.city','City',a.city)}${field('athlete.birthYear','Birth year',a.birthYear)}${field('athlete.handedness','Handedness',a.handedness)}${field('athlete.height','Height',a.height)}${field('athlete.ranking','Ranking',a.ranking)}${field('athlete.coach','Coach',a.coach,{span:2})}${field('athlete.club','Club',a.club,{span:2})}</div></div><div class="card"><div class="form-grid">${field('athlete.story','Athlete story',a.story,{span:4,textarea:true})}${field('athlete.strengths','Strengths',a.strengths,{span:4,textarea:true})}${field('athlete.developmentNeeds','Development needs',a.developmentNeeds,{span:4,textarea:true})}${field('athlete.goal12Months','12-month goal',a.goal12Months,{span:4,textarea:true})}</div></div></div>`; }
function renderTournaments(){ return section('Tournament tracker','Research, shortlist, confirm, budget, and capture results for every tournament.', addButton('Add tournament','addTournament'))+`<div class="grid-3"><a class="link-card" target="_blank" href="https://www.itftennis.com/en/tournament-calendar/world-tennis-tour-juniors-calendar/"><b>Find ITF Junior events</b><p>Open the official calendar, copy details, then paste into tracker.</p></a><a class="link-card" target="_blank" href="https://www.tenniseurope.org/"><b>Check European pathway</b><p>Use for regional junior planning and age-category opportunities.</p></a><a class="link-card" target="_blank" href="https://www.frt.ro/"><b>Romania calendar</b><p>Use local events for lower-cost competition and match reps.</p></a></div><br>${data.tournaments.map(t=>`<div class="card item-card"><div class="form-grid">${arrayField('tournaments',t.id,'name','Tournament name',t.name,{span:2})}${arrayField('tournaments',t.id,'city','City',t.city)}${arrayField('tournaments',t.id,'country','Country',t.country)}${arrayField('tournaments',t.id,'startDate','Start date',t.startDate,{type:'date'})}${arrayField('tournaments',t.id,'endDate','End date',t.endDate,{type:'date'})}${arrayField('tournaments',t.id,'level','Level',t.level)}${arrayField('tournaments',t.id,'surface','Surface',t.surface)}${arrayField('tournaments',t.id,'status','Status',t.status)}${arrayField('tournaments',t.id,'priority','Priority',t.priority)}${arrayField('tournaments',t.id,'budget','Budget EUR',t.budget,{type:'number'})}${arrayField('tournaments',t.id,'result','Result',t.result)}${arrayField('tournaments',t.id,'notes','Notes',t.notes,{span:4,textarea:true})}<div class="span-4"><button class="btn red" data-delete="tournaments" data-id="${t.id}">Delete tournament</button></div></div></div>`).join('')}`; }
function renderBudget(){ const total=data.budget.reduce((s,i)=>s+Number(i.amount||0),0); return section('Budget and funding needs','Track the real cost of the season so sponsor asks are specific and credible.', addButton('Add budget item','addBudget'))+`<div class="stats"><div class="stat"><div class="stat-label">Total need</div><div class="stat-value">${money(total)}</div><div class="stat-detail">Current budget list</div></div><div class="stat"><div class="stat-label">Suggested first ask</div><div class="stat-value">${money(Math.ceil(total/3||0))}</div><div class="stat-detail">Rough starter sponsor target</div></div></div>${data.budget.map(b=>`<div class="card item-card"><div class="form-grid">${arrayField('budget',b.id,'category','Category',b.category)}${arrayField('budget',b.id,'description','Description',b.description,{span:2})}${arrayField('budget',b.id,'amount','EUR',b.amount,{type:'number'})}${arrayField('budget',b.id,'status','Status',b.status)}<div class="span-4"><button class="btn red" data-delete="budget" data-id="${b.id}">Delete item</button></div></div></div>`).join('')}`; }
function renderSponsors(){ return section('Sponsor CRM','Manage prospects, asks, next actions, and the message each sponsor should hear.', addButton('Add sponsor','addSponsor'))+`<div class="grid-2">${data.sponsors.map(s=>`<div class="card item-card"><div class="form-grid">${arrayField('sponsors',s.id,'name','Sponsor',s.name)}${arrayField('sponsors',s.id,'contact','Contact',s.contact)}${arrayField('sponsors',s.id,'email','Email',s.email)}${arrayField('sponsors',s.id,'category','Category',s.category)}${arrayField('sponsors',s.id,'ask','Ask EUR',s.ask,{type:'number'})}${arrayField('sponsors',s.id,'stage','Stage',s.stage)}${arrayField('sponsors',s.id,'nextAction','Next action',s.nextAction,{span:2})}${arrayField('sponsors',s.id,'valueProposition','Value proposition',s.valueProposition,{span:4,textarea:true})}<div class="span-4"><button class="btn red" data-delete="sponsors" data-id="${s.id}">Delete sponsor</button></div></div></div>`).join('')}</div>`; }
function renderMilestones(){ return section('Milestones','Track meaningful moments, decisions, and progress markers.', addButton('Add milestone','addMilestone'))+data.milestones.map(m=>`<div class="card item-card"><div class="form-grid">${arrayField('milestones',m.id,'date','Date',m.date,{type:'date'})}${arrayField('milestones',m.id,'title','Title',m.title,{span:2})}${arrayField('milestones',m.id,'type','Type',m.type)}${arrayField('milestones',m.id,'notes','Notes',m.notes,{span:4,textarea:true})}<div class="span-4"><button class="btn red" data-delete="milestones" data-id="${m.id}">Delete milestone</button></div></div></div>`).join(''); }
function buildDoc(){
 const a=data.athlete; const total=data.budget.reduce((s,i)=>s+Number(i.amount||0),0); const upcoming=[...data.tournaments].sort((x,y)=>(x.startDate||'9999').localeCompare(y.startDate||'9999')).slice(0,6);
 if(docType==='sponsor') return {title:'Local Sponsor Email', sub:'Copy, personalize, and send to a local business', sections:[['Subject',`Local sponsorship opportunity for ${a.firstName || 'a Romanian junior athlete'}`],['Email body',`Hi [Name],\n\nI am reaching out because we are building a clear development and support plan for ${a.firstName || 'a promising junior athlete'} ${a.lastName || ''}, a ${a.sport.toLowerCase()} player based in ${a.city}.\n\n${a.story}\n\nThe current 12-month goal is simple: ${a.goal12Months}\n\nWe are looking for local partners who want to support a specific, transparent athlete pathway. The current planned budget need is ${money(total)}, covering training, tournament travel, equipment, and development support.\n\nA sponsorship could support one tournament trip, one month of training, equipment, or another specific need. In return, we can provide a professional athlete profile, regular progress updates, sponsor recognition where appropriate, and a clear record of how support is used.\n\nWould you be open to a 15-minute conversation next week?\n\nBest,\n[Your Name]`]]};
 if(docType==='trip'){ const n=upcoming[0]; return {title:'Tournament Trip Brief', sub:n?`${n.name} · ${fmtDate(n.startDate)} to ${fmtDate(n.endDate)}`:'No tournament selected', sections:[['Athlete',`${a.firstName || 'Athlete'} ${a.lastName || ''} · ${a.sport} · ${a.city}`],['Event',n?`${n.name}\n${n.city||'TBD'}, ${n.country||'TBD'}\nLevel: ${n.level||'TBD'}\nSurface: ${n.surface||'TBD'}\nStatus: ${n.status}`:'Add a tournament to generate this brief.'],['Budget',n?`Estimated event budget: ${money(n.budget)}`:'TBD'],['Purpose',n?(n.notes||'Add notes about why this event matters.'):'TBD'],['Post-event reporting','Capture matches played, result, lessons, costs, photos, and next development priority.']]}; }
 if(docType==='update'){ const recent=data.tournaments.filter(t=>t.result).slice(-3); return {title:'Sponsor Update', sub:`${a.firstName || 'Athlete'} ${a.lastName || ''} progress note`, sections:[['Overview',`${a.firstName || 'The athlete'} continues to work toward the 12-month objective: ${a.goal12Months}`],['Recent results',recent.length?recent.map(t=>`${t.name}: ${t.result}`).join('\n'):'No results entered yet. Add tournament results to populate this section.'],['Current focus',a.developmentNeeds],['Thank you note','Your support helps turn training and tournament access into a structured development pathway.']]}; }
 return {title:'Athlete Development Plan', sub:`${a.firstName || 'Athlete'} ${a.lastName || ''} · ${a.sport} · ${a.city}`, sections:[['Athlete profile',`${a.story}\n\nCurrent ranking: ${a.ranking || 'TBD'}. Coach: ${a.coach || 'TBD'}. Club: ${a.club || 'TBD'}.`],['12-month objective',a.goal12Months],['Strengths',a.strengths],['Development needs',a.developmentNeeds],['Tournament calendar',upcoming.map(t=>`${fmtDate(t.startDate)}: ${t.name}, ${t.city||'TBD'}, ${t.country||'TBD'} · Priority ${t.priority} · ${money(t.budget)}`).join('\n') || 'No tournaments added yet.'],['Budget summary',`Current planned funding need: ${money(total)}.`]]};
}
function renderPrint(){ const doc=buildDoc(); const tabBtn=(id,label)=>`<button class="btn ${docType===id?'gold':'secondary'}" data-doc="${id}">${label}</button>`; return section('Print center','Generate polished documents from the data already entered. Use browser print to save as PDF.', '<button class="btn" data-action="print">Print selected</button>')+`<div class="doc-tabs no-print">${tabBtn('dev','Development plan')}${tabBtn('sponsor','Local sponsor email')}${tabBtn('trip','Tournament brief')}${tabBtn('update','Sponsor update')}</div>${docHtml(doc)}`; }
function docHtml(doc){ return `<div class="print-sheet"><div class="kicker">Private athlete file</div><h1>${escapeHtml(doc.title)}</h1><div class="sub">${escapeHtml(doc.sub)}</div>${doc.sections.map(s=>`<div class="doc-section"><h3>${escapeHtml(s[0])}</h3><div>${nl2br(s[1])}</div></div>`).join('')}</div>`; }
function renderData(){ return section('Data and backup','Use these controls to move data between browsers or keep a backup copy.')+`<div class="card"><div class="btn-row"><button class="btn" data-action="export">Export JSON backup</button><button class="btn secondary" data-action="import">Import JSON backup</button><button class="btn red" data-action="reset">Reset sample data</button></div><input class="hidden" type="file" id="importFile" accept="application/json"><p class="small">This app stores data locally in this browser. Export JSON after important edits. To share with Ramona or family, send them the JSON file and have them import it into their browser.</p></div>`; }
function render(){
 const nav = document.getElementById('nav'); const mobile = document.getElementById('mobileNav');
 nav.innerHTML = tabs.map(([id,label])=>`<button class="${active===id?'active':''}" data-tab="${id}">${label}</button>`).join('');
 mobile.innerHTML = tabs.map(([id,label])=>`<option value="${id}" ${active===id?'selected':''}>${label}</option>`).join('');
 const view = document.getElementById('appView');
 view.innerHTML = active==='dashboard'?renderDashboard():active==='profile'?renderProfile():active==='tournaments'?renderTournaments():active==='budget'?renderBudget():active==='sponsors'?renderSponsors():active==='milestones'?renderMilestones():active==='print'?renderPrint():renderData();
 document.getElementById('printView').innerHTML = docHtml(buildDoc());
 bind();
}
function bind(){
 document.querySelectorAll('[data-tab]').forEach(b=>b.onclick=()=>{active=b.dataset.tab; render();});
 document.getElementById('mobileNav').onchange=e=>{active=e.target.value; render();};
 document.querySelectorAll('[data-path]').forEach(el=>el.oninput=e=>{ const [obj,key]=e.target.dataset.path.split('.'); data[obj][key]=e.target.type==='number'?Number(e.target.value):e.target.value; localStorage.setItem(KEY, JSON.stringify(data)); });
 document.querySelectorAll('[data-collection]').forEach(el=>el.oninput=e=>{ const arr=data[e.target.dataset.collection]; const item=arr.find(x=>x.id===e.target.dataset.id); item[e.target.dataset.key]=e.target.type==='number'?Number(e.target.value):e.target.value; localStorage.setItem(KEY, JSON.stringify(data)); });
 document.querySelectorAll('[data-delete]').forEach(b=>b.onclick=()=>{ data[b.dataset.delete]=data[b.dataset.delete].filter(x=>x.id!==b.dataset.id); save(); });
 document.querySelectorAll('[data-action]').forEach(b=>b.onclick=()=>handleAction(b.dataset.action));
 document.querySelectorAll('[data-doc]').forEach(b=>b.onclick=()=>{docType=b.dataset.doc; render();});
 const file=document.getElementById('importFile'); if(file) file.onchange=importData;
}
function handleAction(action){
 if(action==='addTournament') data.tournaments.push({id:uid(),name:'New Tournament',city:'',country:'',startDate:'',endDate:'',level:'',surface:'',status:'Researching',priority:'B',budget:0,result:'',notes:''});
 if(action==='addBudget') data.budget.push({id:uid(),category:'Training',description:'New budget item',amount:0,status:'Planned'});
 if(action==='addSponsor') data.sponsors.push({id:uid(),name:'New Sponsor Prospect',contact:'',email:'',category:'Local sponsor',ask:1000,stage:'Prospect',nextAction:'Research contact',valueProposition:''});
 if(action==='addMilestone') data.milestones.push({id:uid(),date:'',title:'New milestone',type:'Planning',notes:''});
 if(action==='print') window.print();
 if(action==='export') exportData();
 if(action==='import') document.getElementById('importFile').click();
 if(action==='reset') return resetData();
 save();
}
function exportData(){ const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'}); const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='athlete-os-backup.json'; a.click(); URL.revokeObjectURL(a.href); }
function importData(e){ const f=e.target.files[0]; if(!f) return; const reader=new FileReader(); reader.onload=()=>{ try{ data=JSON.parse(reader.result); save(); alert('Import complete.'); } catch { alert('Could not import this JSON file.'); } }; reader.readAsText(f); }
render();
</script>
</body>
</html>
