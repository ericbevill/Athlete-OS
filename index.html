<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Andreea Athlete OS</title>
  <link rel="stylesheet" href="css/styles.css?v=v4" />
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div class="topbar-inner">
        <div class="brand">Andreea Athlete OS</div>
        <nav class="nav" id="nav"></nav>
      </div>
    </header>

    <main class="wrap">
      <section class="hero">
        <div class="court"></div>
        <div class="hero-bg"></div>
        <div class="tennis-ribbon"><span>Clay</span><span>Hard</span><span>ITF Juniors</span><span>Sponsor Ready</span></div>
        <img class="hero-cutout" id="heroCutout" src="assets/andreea-cutout.png" alt="Andreea" onerror="this.style.display='none'" />
        <div class="hero-text">
          <div class="eyebrow">Romania · Junior Tennis</div>
          <h1 id="heroName">Andreea Olariu</h1>
          <p id="heroSummary"></p>
          <div class="hero-actions">
            <button class="btn primary" data-go="documents">Generate documents</button>
            <button class="btn" data-go="career">View career roadmap</button>
          </div>
        </div>
        <div class="hero-stats">
          <div class="hero-stat"><span>ITF Junior</span><strong id="heroItf">503</strong></div>
          <div class="hero-stat"><span>Funding Need</span><strong id="heroBudget">€0</strong></div>
          <div class="hero-stat"><span>Pipeline</span><strong id="heroPipeline">€0</strong></div>
        </div>
      </section>

      <section class="metrics" id="metrics"></section>

      <section class="page active" id="dashboard"></section>
      <section class="page" id="profile"></section>
      <section class="page" id="career"></section>
      <section class="page" id="calendar"></section>
      <section class="page" id="tournaments"></section>
      <section class="page" id="rankings"></section>
      <section class="page" id="budget"></section>
      <section class="page" id="sponsors"></section>
      <section class="page" id="documents"></section>
      <section class="page" id="settings"></section>
    </main>
  </div>
  <script src="js/app.js?v=v4"></script>
</body>
</html>
